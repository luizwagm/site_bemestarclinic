# ==========================================================================
#  /etc/nginx/sites-available/bemestarclinic.com
#
#  Instalar:
#    sudo cp nginx/bemestarclinic.com.conf /etc/nginx/sites-available/bemestarclinic.com
#    sudo ln -s /etc/nginx/sites-available/bemestarclinic.com /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
#  Depois rode o certbot (ele reescreve este arquivo acrescentando o bloco 443
#  e o redirecionamento). Não edite as linhas que o certbot inserir.
# ==========================================================================

server {
    listen 80;
    listen [::]:80;
    server_name bemestarclinic.com www.bemestarclinic.com;

    # O painel envia foto em base64 dentro do JSON. O padrão do nginx é 1 MB —
    # sem isto, enviar uma foto de celular devolve 413 e o upload falha.
    # 25 MB é o mesmo teto que o server.js aplica.
    client_max_body_size 25m;

    access_log /var/log/nginx/bemestarclinic.access.log;
    error_log  /var/log/nginx/bemestarclinic.error.log;

    # Metadados de repositório nunca devem sair pela web. O server.js já bloqueia,
    # mas aqui a porta fecha antes mesmo de chegar na aplicação.
    location ~ /\.(git|env|gitignore) {
        deny all;
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:5185;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # Sem estes dois a aplicação enxerga todo mundo como 127.0.0.1:
        # o contador de acessos contaria 1 visitante só, e o cookie de sessão
        # do painel não receberia a marca Secure.
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }
}
